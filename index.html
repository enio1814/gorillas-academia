<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gorillas Academia</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🦍 GORILLAS ACADEMIA</h1>

<nav>
<a href="#planos">Planos</a>
<a href="#cadastro">Cadastro</a>
</nav>

</header>

<section class="hero">

<h2>Transforme seu corpo na Gorillas</h2>

<p>
Cadastre-se online e pague sua mensalidade.
</p>

<a href="#cadastro" class="btn">
Começar Agora
</a>

</section>

<section id="planos">

<h2>Nossos Planos</h2>

<div class="planos">

<div class="plano">
<h3>Plano Básico</h3>
<p>R$ 79,90 / mês</p>
</div>

<div class="plano">
<h3>Plano Premium</h3>
<p>R$ 99,90 / mês</p>
</div>

<div class="plano">
<h3>Plano VIP</h3>
<p>R$ 129,90 / mês</p>
</div>

</div>

</section>

<section id="cadastro">

<h2>Cadastro</h2>

<form action="https://formsubmit.co/seuemail@gmail.com" method="POST">

<input type="text" name="nome" placeholder="Nome completo" required>

<input type="email" name="email" placeholder="Email" required>

<input type="tel" name="telefone" placeholder="Telefone" required>

<select name="plano">

<option>Plano Básico</option>
<option>Plano Premium</option>
<option>Plano VIP</option>

</select>

<button type="submit">
Cadastrar e Ir para Pagamento
</button>

</form>

</section>

<footer>

<p>
© 2026 Gorillas Academia
</p>

</footer>

</body>

</html>
